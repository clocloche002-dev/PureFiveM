<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bouton Spéculaire</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #0d0e12;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .specular-button {
      position: relative;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      background: transparent;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      outline: none;
      overflow: hidden; /* Clips the rotating square to the button's pill shape */
      z-index: 1;
      box-shadow:
        0 4px 15px rgba(0, 0, 0, 0.4);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Inner background / body of the button */
    .specular-button::after {
      content: '';
      position: absolute;
      inset: 2px; /* Creates a 2px border width */
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-radius: 48px; /* Slightly smaller to fit inside */
      z-index: -1;
      transition: background 0.3s ease;
    }

    /* Rotating light outline (comet effect) */
    .specular-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150%;
      aspect-ratio: 1 / 1;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        transparent 75%,
        #ffffff 90%,
        #ffffff 95%,
        transparent 100%
      );
      transform: translate(-50%, -50%) rotate(0deg);
      z-index: -2;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* Hover Effects */
    .specular-button:hover {
      box-shadow:
        0 8px 25px rgba(97, 97, 97, 0.25),
        0 4px 15px rgba(0, 0, 0, 0.4);
      transform: translateY(-2px);
    }

    .specular-button:hover::before {
      opacity: 1;
      animation: spin-border 2s linear infinite;
    }

    .specular-button:hover::after {
      background: linear-gradient(135deg, #2d3748, #1a202c);
    }

    /* Active State */
    .specular-button:active {
      transform: translateY(1px);
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.4);
    }

    @keyframes spin-border {
      0% {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      100% {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <button class="specular-button">Découvrir l'effet</button>

</body>
</html>
